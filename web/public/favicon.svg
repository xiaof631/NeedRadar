<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
  </defs>
  <!-- background -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- radar rings -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="#475569" stroke-width="1.5" opacity="0.6"/>
  <circle cx="50" cy="50" r="24" fill="none" stroke="#475569" stroke-width="1.5" opacity="0.6"/>
  <circle cx="50" cy="50" r="12" fill="none" stroke="#475569" stroke-width="1.5" opacity="0.6"/>
  <!-- crosshairs -->
  <line x1="50" y1="8" x2="50" y2="92" stroke="#475569" stroke-width="1" opacity="0.4"/>
  <line x1="8" y1="50" x2="92" y2="50" stroke="#475569" stroke-width="1" opacity="0.4"/>
  <!-- signal arc -->
  <path d="M50 26 A24 24 0 0 1 74 50" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M50 38 A12 12 0 0 0 38 50" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- center dot -->
  <circle cx="50" cy="50" r="4" fill="#38bdf8"/>
  <!-- outer ring -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#38bdf8" stroke-width="2"/>
</svg>
